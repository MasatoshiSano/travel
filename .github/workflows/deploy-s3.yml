name: Deploy site to S3

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/deploy-s3.yml'
  workflow_dispatch:

env:
  AWS_REGION: ap-northeast-1
  S3_BUCKET: honeymoon-roma-paris-2026-863646532781

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync HTML files (no cache)
        run: |
          aws s3 sync site/ s3://${S3_BUCKET}/ \
            --delete \
            --exclude "*" \
            --include "*.html" \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html; charset=utf-8"

      - name: Sync static assets (long cache)
        run: |
          aws s3 sync site/ s3://${S3_BUCKET}/ \
            --exclude "*.html" \
            --exclude "*.md" \
            --exclude ".*" \
            --exclude "*/.*" \
            --cache-control "public, max-age=86400"

      - name: Summary
        run: |
          echo "Deployed to https://${S3_BUCKET}.s3.${AWS_REGION}.amazonaws.com/index.html"
